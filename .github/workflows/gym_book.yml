name: Auto Book Gym

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

env:
  TZ: Asia/Shanghai

jobs:
  book:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: GymAutoBook

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - run: pip install -r GymAutoBook/requirements.txt

      - run: python GymAutoBook/gym_auto_book.py
        env:
          GYM_USERNAME: ${{ secrets.GYM_USERNAME }}
          GYM_PASSWORD: ${{ secrets.GYM_PASSWORD }}
          NOTIFY_URL: ${{ secrets.NOTIFY_URL }}
